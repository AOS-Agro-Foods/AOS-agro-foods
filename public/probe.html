<!DOCTYPE html><html><body><pre id="o">probing...</pre>
<script>
(async()=>{
  const out=[];
  // Try the /download/video endpoint - it usually redirects
  try {
    const r = await fetch('https://www.pexels.com/download/video/27202595/', {redirect:'follow'});
    out.push(`download endpoint: ${r.status} -> ${r.url}`);
  } catch(e){ out.push('download err: '+e.message); }
  // Also try playing the video element directly
  const v = document.createElement('video');
  v.src = 'https://videos.pexels.com/video-files/27202595/27202595-hd_1920_1080_30fps.mp4';
  v.muted = true;
  v.addEventListener('loadedmetadata',()=>{out.push('VIDEO LOADED OK');document.getElementById('o').innerText=out.join('\n');});
  v.addEventListener('error',(e)=>{out.push('VIDEO ERR code='+(v.error&&v.error.code));document.getElementById('o').innerText=out.join('\n');});
  document.body.appendChild(v);
  setTimeout(()=>{document.getElementById('o').innerText=out.join('\n');document.title='DONE';},5000);
})();
</script></body></html>
